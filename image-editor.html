<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVA Image Editor | Universal Dragon</title>
  <style>
    :root{
      --bg:#030807;
      --panel:rgba(0,18,14,.82);
      --line:rgba(0,255,208,.32);
      --cyan:#00ffd0;
      --fire:#ff8a1f;
      --text:#eafff9;
      --muted:#8bbdb3;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(0,255,208,.12), transparent 30%),
        radial-gradient(circle at 85% 25%, rgba(255,115,0,.14), transparent 32%),
        linear-gradient(180deg, #020504, #06110e 55%, #020504);
      color:var(--text);
      font-family: "Courier New", monospace;
      letter-spacing:.08em;
      padding:18px;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
    }

    .top{
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      background:rgba(0,0,0,.45);
      box-shadow:0 0 28px rgba(0,255,208,.16);
      margin-bottom:16px;
    }

    h1{
      margin:0;
      color:var(--cyan);
      font-size:24px;
      text-shadow:0 0 14px rgba(0,255,208,.5);
    }

    .sub{
      color:var(--muted);
      margin-top:8px;
      line-height:1.6;
      font-size:13px;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:24px;
      background:var(--panel);
      padding:16px;
      box-shadow:0 0 24px rgba(0,255,208,.12);
      margin-bottom:16px;
    }

    .canvasBox{
      width:100%;
      min-height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px dashed rgba(0,255,208,.32);
      border-radius:22px;
      background:rgba(0,0,0,.38);
      overflow:hidden;
      padding:12px;
    }

    canvas{
      max-width:100%;
      max-height:70vh;
      border-radius:14px;
      background:#050505;
      box-shadow:0 0 22px rgba(0,0,0,.6);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .btn, input[type=file]::file-selector-button{
      border:1px solid var(--line);
      background:rgba(0,255,208,.08);
      color:var(--text);
      border-radius:16px;
      padding:13px 14px;
      font-family:inherit;
      letter-spacing:.08em;
      cursor:pointer;
      text-align:center;
      box-shadow:0 0 16px rgba(0,255,208,.1);
    }

    .btn.fire{
      border-color:rgba(255,138,31,.55);
      box-shadow:0 0 16px rgba(255,138,31,.16);
    }

    .btn:active{
      transform:scale(.98);
    }

    input[type=file]{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      color:var(--muted);
      background:rgba(0,0,0,.32);
      font-family:inherit;
    }

    label{
      display:block;
      color:var(--cyan);
      font-size:13px;
      margin:12px 0 7px;
    }

    input[type=range]{
      width:100%;
      accent-color:var(--cyan);
    }

    .status{
      white-space:pre-wrap;
      color:#9fffe9;
      background:rgba(0,0,0,.38);
      border:1px solid rgba(0,255,208,.2);
      border-radius:18px;
      padding:12px;
      line-height:1.6;
      min-height:52px;
      margin-top:12px;
    }

    a{
      color:var(--cyan);
      text-decoration:none;
    }

    @media(max-width:650px){
      body{ padding:12px; }
      h1{ font-size:20px; }
      .grid{ grid-template-columns:1fr; }
      .canvasBox{ min-height:260px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>🖼️ NOVA IMAGE EDITOR</h1>
      <div class="sub">
        Universal Dragon · Aslam · frontend safe editor<br>
        Upload → edit → copy/download. No secret, no backend.
      </div>
    </div>

    <div class="panel">
      <input id="fileInput" type="file" accept="image/*" />
      <div class="status" id="status">Upload image pannunga bro. NOVA editor ready 😄</div>
    </div>

    <div class="panel">
      <div class="canvasBox">
        <canvas id="canvas" width="900" height="600"></canvas>
      </div>
    </div>

    <div class="panel">
      <label>☀️ Brightness: <span id="bVal">100</span>%</label>
      <input id="brightness" type="range" min="40" max="180" value="100" />

      <label>🎚️ Contrast: <span id="cVal">100</span>%</label>
      <input id="contrast" type="range" min="40" max="180" value="100" />

      <label>🌈 Saturation: <span id="sVal">100</span>%</label>
      <input id="saturation" type="range" min="0" max="220" value="100" />
    </div>

    <div class="panel">
      <div class="grid">
        <button class="btn" onclick="rotateImage()">🔄 Rotate</button>
        <button class="btn" onclick="flipImage()">↔️ Flip</button>
        <button class="btn fire" onclick="cropSquare()">✂️ Center Crop</button>
        <button class="btn" onclick="resetImage()">🧹 Reset</button>
        <button class="btn" onclick="copyImage()">📋 Copy Image</button>
        <button class="btn fire" onclick="downloadImage()">⬇️ Download PNG</button>
      </div>
    </div>

    <div class="panel">
      <a class="btn" style="display:block;" href="index.html">← Back to NOVA</a>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusBox = document.getElementById("status");

    const brightness = document.getElementById("brightness");
    const contrast = document.getElementById("contrast");
    const saturation = document.getElementById("saturation");

    const bVal = document.getElementById("bVal");
    const cVal = document.getElementById("cVal");
    const sVal = document.getElementById("sVal");

    let img = new Image();
    let loaded = false;
    let rotation = 0;
    let flipped = false;
    let originalDataUrl = "";

    function status(msg){
      statusBox.textContent = msg;
    }

    function emptyCanvas(){
      ctx.fillStyle = "#050807";
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = "#00ffd0";
      ctx.font = "24px Courier New";
      ctx.textAlign = "center";
      ctx.fillText("NOVA IMAGE EDITOR", canvas.width/2, canvas.height/2 - 10);
      ctx.fillStyle = "#8bbdb3";
      ctx.font = "15px Courier New";
      ctx.fillText("Upload image to start", canvas.width/2, canvas.height/2 + 28);
    }

    emptyCanvas();

    function fitCanvasToImage(){
      let w = img.naturalWidth || img.width;
      let h = img.naturalHeight || img.height;

      const max = 1400;
      const scale = Math.min(1, max / Math.max(w, h));
      w = Math.max(1, Math.round(w * scale));
      h = Math.max(1, Math.round(h * scale));

      if(rotation % 180 !== 0){
        canvas.width = h;
        canvas.height = w;
      } else {
        canvas.width = w;
        canvas.height = h;
      }
    }

    function draw(){
      if(!loaded){
        emptyCanvas();
        return;
      }

      fitCanvasToImage();

      const w = canvas.width;
      const h = canvas.height;
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;

      ctx.clearRect(0,0,w,h);
      ctx.save();

      ctx.filter =
        `brightness(${brightness.value}%) contrast(${contrast.value}%) saturate(${saturation.value}%)`;

      ctx.translate(w/2, h/2);
      ctx.rotate(rotation * Math.PI / 180);

      if(flipped) ctx.scale(-1, 1);

      let dw, dh;
      if(rotation % 180 !== 0){
        dw = h;
        dh = w;
      } else {
        dw = w;
        dh = h;
      }

      ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
      ctx.restore();

      bVal.textContent = brightness.value;
      cVal.textContent = contrast.value;
      sVal.textContent = saturation.value;
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if(!file) return;

      if(!file.type.startsWith("image/")){
        status("Image file illa bro. Proper image upload pannunga 😄");
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        originalDataUrl = reader.result;
        img = new Image();
        img.onload = () => {
          loaded = true;
          rotation = 0;
          flipped = false;
          brightness.value = 100;
          contrast.value = 100;
          saturation.value = 100;
          draw();
          status("Image loaded ✅ Edit pannalam bro.");
        };
        img.src = originalDataUrl;
      };
      reader.readAsDataURL(file);
    });

    [brightness, contrast, saturation].forEach(el => {
      el.addEventListener("input", draw);
    });

    function rotateImage(){
      if(!loaded) return status("Mudhal image upload pannunga bro.");
      rotation = (rotation + 90) % 360;
      draw();
      status("Rotated 🔄");
    }

    function flipImage(){
      if(!loaded) return status("Mudhal image upload pannunga bro.");
      flipped = !flipped;
      draw();
      status("Flipped ↔️");
    }

    function resetImage(){
      if(!originalDataUrl) return status("Reset panna image illa bro.");
      img = new Image();
      img.onload = () => {
        loaded = true;
        rotation = 0;
        flipped = false;
        brightness.value = 100;
        contrast.value = 100;
        saturation.value = 100;
        draw();
        status("Reset complete 🧹");
      };
      img.src = originalDataUrl;
    }

    function cropSquare(){
      if(!loaded) return status("Crop panna image upload pannunga bro.");

      draw();

      const size = Math.min(canvas.width, canvas.height);
      const sx = Math.floor((canvas.width - size) / 2);
      const sy = Math.floor((canvas.height - size) / 2);

      const tmp = document.createElement("canvas");
      tmp.width = size;
      tmp.height = size;

      const tctx = tmp.getContext("2d");
      tctx.drawImage(canvas, sx, sy, size, size, 0, 0, size, size);

      originalDataUrl = tmp.toDataURL("image/png");

      img = new Image();
      img.onload = () => {
        loaded = true;
        rotation = 0;
        flipped = false;
        brightness.value = 100;
        contrast.value = 100;
        saturation.value = 100;
        draw();
        status("Center crop done ✂️");
      };
      img.src = originalDataUrl;
    }

    function downloadImage(){
      if(!loaded) return status("Download panna image illa bro.");
      draw();
      const a = document.createElement("a");
      a.download = "nova-edited-image.png";
      a.href = canvas.toDataURL("image/png");
      a.click();
      status("Downloaded PNG ✅");
    }

    async function copyImage(){
      if(!loaded) return status("Copy panna image illa bro.");
      draw();

      try{
        const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
        await navigator.clipboard.write([
          new ClipboardItem({ "image/png": blob })
        ]);
        status("Image copied to clipboard 📋");
      }catch(e){
        status("Browser image copy support illa bro. Download use pannunga 😄");
      }
    }
  </script>
</body>
</html>
