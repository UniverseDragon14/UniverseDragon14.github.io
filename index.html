<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Dragon OS | Master Aslam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00ffcc; }
        body { background: #010103; color: white; font-family: 'Courier New', monospace; overflow-x: hidden; }
        .glass { background: rgba(0, 255, 204, 0.05); border: 1px solid rgba(0, 255, 204, 0.2); backdrop-filter: blur(20px); }
        .chat-area { height: 320px; overflow-y: auto; scrollbar-width: none; }
        .nova-msg { color: var(--neon); font-weight: bold; margin-bottom: 15px; border-left: 3px solid var(--neon); padding-left: 12px; }
        .user-msg { color: #fff; text-align: right; margin-bottom: 15px; background: rgba(255,255,255,0.07); padding: 10px; border-radius: 12px; }
        .loading-text { color: var(--neon); font-size: 10px; animation: blink 0.8s infinite; display: none; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div class="w-full max-w-md glass rounded-[2.5rem] p-6 shadow-[0_0_40px_rgba(0,255,204,0.15)] mt-6">
        <div class="flex items-center gap-5 mb-6 border-b border-white/10 pb-6">
            <div class="relative">
                <img src="https://github.com/UniverseDragon14.png" class="w-16 h-16 rounded-full border-2 border-[#00ffcc] shadow-[0_0_20px_#00ffcc]">
                <div class="absolute bottom-1 right-0 w-3.5 h-3.5 bg-green-500 rounded-full border-2 border-black animate-pulse"></div>
            </div>
            <div>
                <h1 class="text-2xl font-black text-[#00ffcc] tracking-tighter italic">ASLAM</h1>
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.2em]">Universal Dragon Founder</p>
            </div>
        </div>

        <div class="bg-black/50 rounded-[2rem] p-5 border border-white/5 mb-4">
            <div id="chat-box" class="chat-area space-y-4 text-[11px] leading-relaxed pr-1">
                <div class="nova-msg">வணக்கம் மாஸ்டர் அஸ்லாம். 7வது பரிமாணத்தின் NOVA மையம் தயார் நிலையில் உள்ளது. (Ares Grid Connected)</div>
            </div>
            <div id="loader" class="loading-text mt-3 font-black">>> NOVA IS THINKING...</div>
        </div>

        <div class="relative mb-6">
            <input type="text" id="user-input" placeholder="Nova-விடம் பேசவும்..." class="w-full bg-black/80 border border-white/10 rounded-2xl py-4.5 px-6 text-xs text-[#00ffcc] outline-none focus:border-[#00ffcc] shadow-inner">
            <button onclick="askNova()" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#00ffcc] font-black tracking-widest text-[10px]">SEND</button>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="window.location.href='intent://#Intent;scheme=termux;package=com.termux;end'" class="py-3.5 bg-[#00ffcc] text-black font-black text-[10px] rounded-xl uppercase tracking-widest">Open Termux</button>
            <button onclick="location.reload()" class="py-3.5 border border-white/10 text-gray-500 font-bold text-[10px] rounded-xl uppercase tracking-widest">Sync Grid</button>
        </div>
    </div>

    <script>
        // Unga screenshot-la iruntha real API Key
        const NOVA_KEY = "AIzaSyCLKuRWmQirlF5gI4OuUI9S8u01TNm8VWo";
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const loader = document.getElementById('loader');

        async function askNova() {
            const msg = userInput.value;
            if (!msg) return;

            // User Message Display
            const u = document.createElement('div');
            u.className = 'user-msg';
            u.innerText = msg;
            chatBox.appendChild(u);
            userInput.value = '';
            
            loader.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Real Gemini 1.5 Flash Call
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${NOVA_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "You are NOVA, a 7D AI core created by Master Aslam for Universal Dragon. Respond loyally in Tamil and English mixed. Query: " + msg }] }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                const n = document.createElement('div');
                n.className = 'nova-msg';
                n.innerText = "> NOVA: " + aiText;
                chatBox.appendChild(n);
                
            } catch (err) {
                const e = document.createElement('div');
                e.className = 'text-red-500 text-[10px] italic';
                e.innerText = "> ERROR: 7D Grid Connection Lost.";
                chatBox.appendChild(e);
            }
            
            loader.style.display = 'none';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') askNova(); });
    </script>
</body>
</html>
