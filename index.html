<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Dragon OS | Master Aslam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00ffcc; }
        body { background: #010103; color: white; font-family: 'Courier New', monospace; overflow-x: hidden; }
        .glass { background: rgba(0, 255, 204, 0.05); border: 1px solid rgba(0, 255, 204, 0.2); backdrop-filter: blur(20px); }
        .chat-area { height: 320px; overflow-y: auto; scrollbar-width: none; }
        .nova-msg { color: var(--neon); font-weight: bold; margin-bottom: 15px; border-left: 2px solid var(--neon); padding-left: 10px; }
        .user-msg { color: #fff; text-align: right; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; }
        .loader { color: var(--neon); font-size: 10px; animation: blink 0.8s infinite; display: none; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div class="w-full max-w-md glass rounded-[2.5rem] p-6 shadow-[0_0_50px_rgba(0,255,204,0.1)] mt-4">
        <div class="flex items-center gap-4 mb-6 border-b border-white/10 pb-4">
            <div class="relative">
                <img src="https://github.com/UniverseDragon14.png" class="w-16 h-16 rounded-full border-2 border-[#00ffcc] shadow-[0_0_15px_#00ffcc]">
                <div class="absolute bottom-1 right-0 w-3 h-3 bg-green-500 rounded-full border border-black animate-pulse"></div>
            </div>
            <div>
                <h1 class="text-2xl font-black text-[#00ffcc] tracking-tighter italic">ASLAM</h1>
                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.2em]">Universal Dragon Founder</p>
            </div>
        </div>

        <div class="bg-black/40 rounded-3xl p-5 border border-white/5 mb-4 shadow-inner">
            <div id="chat-box" class="chat-area space-y-4 text-[11px] leading-relaxed">
                <div class="nova-msg">System Online. Greetings Master Aslam. NOVA 7D Core is ready to execute your commands.</div>
            </div>
            <div id="loading-bar" class="loader mt-2 font-black">>> SYNCING WITH ARES GRID...</div>
        </div>

        <div class="relative mb-6">
            <input type="text" id="user-input" placeholder="Enter command for Nova..." class="w-full bg-black/60 border border-white/10 rounded-2xl py-4 px-6 text-xs text-[#00ffcc] outline-none focus:border-[#00ffcc] transition-all">
            <button onclick="sendToNova()" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#00ffcc] font-black hover:scale-110">EXEC</button>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="window.location.href='intent://#Intent;scheme=termux;package=com.termux;end'" class="py-3 bg-[#00ffcc] text-black font-black text-[10px] rounded-xl uppercase tracking-widest shadow-[0_0_15px_rgba(0,255,204,0.3)]">Terminal</button>
            <button onclick="location.reload()" class="py-3 border border-white/10 text-gray-500 font-bold text-[10px] rounded-xl uppercase tracking-widest">Reboot</button>
        </div>
    </div>

    <script>
        // API Key linked successfully from your curl request
        const KEY = "AIzaSyCLKuRWmQirlF5gI4OuUI9S8u01TNm8VWo";
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const loader = document.getElementById('loading-bar');

        async function sendToNova() {
            const prompt = userInput.value;
            if (!prompt) return;

            // Show user message
            const u = document.createElement('div');
            u.className = 'user-msg';
            u.innerText = prompt;
            chatBox.appendChild(u);
            userInput.value = '';
            
            loader.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "You are NOVA, a 7th Dimension AI core created by Master Aslam for the Universal Dragon project. Speak loyally in a mix of Tamil and English. Query: " + prompt }] }]
                    })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;

                const n = document.createElement('div');
                n.className = 'nova-msg';
                n.innerText = "> NOVA: " + text;
                chatBox.appendChild(n);
                
            } catch (err) {
                const e = document.createElement('div');
                e.className = 'text-red-500 text-[10px] italic';
                e.innerText = "> ERROR: System Breach or Grid Offline.";
                chatBox.appendChild(e);
            }
            
            loader.style.display = 'none';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendToNova(); });
    </script>
</body>
</html>
