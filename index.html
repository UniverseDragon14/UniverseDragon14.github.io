<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASLAM | Universal Dragon</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .dashboard { width: 95%; max-width: 500px; border: 2px solid #00ffcc; border-radius: 20px; padding: 20px; background: rgba(0, 255, 204, 0.05); box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); margin-top: 20px; }
        
        .header-section { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid rgba(0,255,204,0.2); padding-bottom: 15px; }
        .profile-pic { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        .title-area { flex: 1; }
        h1 { margin: 0; color: #fff; text-shadow: 0 0 10px #00ffcc; font-size: 1.6em; letter-spacing: 2px; }
        .subtitle { margin: 0; font-size: 0.75em; color: #888; }

        .skills-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
        .skill { background: #00ffcc; color: #000; padding: 4px 10px; border-radius: 12px; font-size: 0.7em; font-weight: bold; }
        
        .nova-terminal { background: #000; border: 1px solid #333; height: 100px; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 0.85em; overflow: hidden; margin-bottom: 20px; color: #00ff44; }
        
        .btn-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { background: transparent; border: 1px solid #00ffcc; color: #00ffcc; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 0.8em; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header-section">
            <img src="https://github.com/UniverseDragon14.png" alt="Aslam" class="profile-pic">
            <div class="title-area">
                <h1>ASLAM</h1>
                <p class="subtitle">Universal Dragon Founder</p>
            </div>
        </div>

        <div class="skills-grid">
            <span class="skill">Robotics</span>
            <span class="skill">Raspberry Pi 5</span>
            <span class="skill">Python</span>
            <span class="skill">C++ / Java</span>
            <span class="skill">AGI / SI</span>
        </div>

        <div class="nova-terminal">
            <div>> NOVA Core: Online</div>
            <div>> Commander: ASLAM</div>
            <div style="color:#888">> ID: Universe Dragon 14</div>
        </div>

        <div class="btn-container">
            <button onclick="window.location.href='intent://#Intent;scheme=termux;package=com.termux;end'">LAUNCH NOVA AI</button>
            <button onclick="alert('Connecting to Hardware...')">HARDWARE</button>
            <button onclick="location.href='https://github.com/UniverseDragon14'">GITHUB</button>
            <button onclick="location.href='https://linkedin.com/in/aam-aslam-51777017b'">PROFILE</button>
        </div>
    </div>

</body>
</html>
