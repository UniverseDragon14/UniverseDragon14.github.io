<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASLAM | Universal Dragon 14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00ffcc; --gold: #ffcc00; }
        body { background: #010103; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(0, 255, 204, 0.03); border: 1px solid rgba(0, 255, 204, 0.2); backdrop-filter: blur(10px); }
        .neon-glow { border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div class="dashboard w-full max-w-md glass rounded-[2.5rem] p-6 neon-glow mt-8">
        
        <div class="flex items-center gap-5 mb-8 border-b border-white/10 pb-6">
            <div class="relative">
                <img src="https://github.com/UniverseDragon14.png" alt="Aslam" class="w-20 h-20 rounded-full border-2 border-[#00ffcc] shadow-[0_0_20px_#00ffcc]">
                <div class="absolute bottom-1 right-1 w-5 h-5 bg-green-500 rounded-full border-4 border-[#020205] animate-pulse"></div>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-[#00ffcc] italic uppercase leading-none">ASLAM</h1>
                <p class="text-[10px] text-gray-400 font-mono mt-1">ID: UNIVERSE DRAGON 14</p>
                <div class="flex items-center gap-2 mt-2">
                    <span class="text-[9px] bg-[#ffcc00]/20 text-[#ffcc00] px-2 py-0.5 rounded border border-[#ffcc00]/30 font-bold">FOUNDER & DEVELOPER</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-black/50 p-4 rounded-2xl border border-white/5 shadow-inner">
                <div class="flex justify-between text-[10px] text-cyan-400 mb-2 font-mono font-bold"><span>CPU_RPi5</span><span id="cpu-val">24%</span></div>
                <div class="h-1.5 bg-gray-800 rounded-full overflow-hidden">
                    <div id="cpu-bar" class="h-full bg-cyan-400 transition-all duration-1000" style="width: 24%"></div>
                </div>
            </div>
            <div class="bg-black/50 p-4 rounded-2xl border border-white/5 shadow-inner">
                <div class="flex justify-between text-[10px] text-orange-400 mb-2 font-mono font-bold"><span>CORE_TEMP</span><span id="temp-val">48°C</span></div>
                <div class="h-1.5 bg-gray-800 rounded-full overflow-hidden">
                    <div id="temp-bar" class="h-full bg-orange-400 transition-all duration-1000" style="width: 60%"></div>
                </div>
            </div>
        </div>

        <div id="terminal" class="bg-black/80 border border-white/10 rounded-2xl p-5 h-44 overflow-y-auto mb-8 font-mono text-[11px] text-[#00ff44] leading-relaxed">
            <div class="text-white/30 mb-3 uppercase text-[9px] tracking-[3px] border-b border-white/5 pb-2">Neural Link Feed</div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="window.location.href='intent://#Intent;scheme=termux;package=com.termux;end'" class="py-4 bg-[#00ffcc] text-black rounded-2xl font-black text-xs tracking-widest uppercase shadow-[0_0_20px_rgba(0,255,204,0.3)] hover:scale-105 active:scale-95 transition-all">Launch Nova AI</button>
            <button onclick="window.location.href='https://github.com/UniverseDragon14'" class="py-4 border border-white/20 text-white rounded-2xl font-bold text-xs tracking-widest uppercase hover:bg-white/10 transition-all">GitHub Project</button>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const logs = [
            "> [BOOT] Universe Dragon OS v7.0 Initialized.",
            "> [AUTH] Operator: ASLAM confirmed.",
            "> [ID] Linked to: Universe Dragon 14.",
            "> [AI] NOVA Neural Brain online.",
            "> [NET] 7th Dimension Link: SECURE.",
            "> [READY] System monitoring active..."
        ];

        let i = 0;
        function type() {
            if (i < logs.length) {
                const p = document.createElement('div');
                p.className = "mb-1.5 opacity-90";
                p.innerHTML = logs[i];
                terminal.appendChild(p);
                terminal.scrollTop = terminal.scrollHeight;
                i++;
                setTimeout(type, 800);
            }
        }

        function updateStats() {
            const cpu = Math.floor(Math.random() * 20) + 15;
            const temp = Math.floor(Math.random() * 5) + 45;
            document.getElementById('cpu-val').innerText = cpu + "%";
            document.getElementById('cpu-bar').style.width = cpu + "%";
            document.getElementById('temp-val').innerText = temp + "°C";
            document.getElementById('temp-bar').style.width = (temp/80)*100 + "%";
        }

        window.onload = () => { type(); setInterval(updateStats, 2000); };
    </script>
</body>
</html>
