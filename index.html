<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASLAM | Universal Dragon Founder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00ffcc; --dark: #010103; }
        body { background: var(--dark); color: white; font-family: 'Courier New', monospace; overflow-x: hidden; }
        .glass { background: rgba(0, 255, 204, 0.03); border: 1px solid rgba(0, 255, 204, 0.2); backdrop-filter: blur(15px); }
        .tag { background: rgba(0, 255, 204, 0.1); border: 1px solid var(--neon); color: var(--neon); font-size: 9px; font-weight: bold; padding: 4px 12px; border-radius: 50px; }
        .chat-box { height: 280px; overflow-y: auto; scrollbar-width: none; background: rgba(0,0,0,0.4); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .nova-msg { color: var(--neon); font-weight: bold; margin-bottom: 12px; border-left: 2px solid var(--neon); padding-left: 10px; font-size: 11px; }
        .user-msg { color: #fff; text-align: right; margin-bottom: 12px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; font-size: 11px; }
        .glow-btn { border: 1px solid var(--neon); color: var(--neon); font-weight: black; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .glow-btn:active { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div class="w-full max-w-md glass rounded-[2.5rem] p-6 mb-6 mt-4 shadow-2xl">
        <div class="flex items-center gap-5 mb-6">
            <div class="relative">
                <img src="https://github.com/UniverseDragon14.png" class="w-20 h-20 rounded-full border-2 border-[#00ffcc] shadow-[0_0_15px_rgba(0,255,204,0.5)]">
                <div class="absolute bottom-1 right-1 w-4 h-4 bg-[#00ffcc] rounded-full border-2 border-black animate-pulse"></div>
            </div>
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase">ASLAM</h1>
                <p class="text-[10px] text-[#00ffcc] font-bold tracking-[3px] uppercase">Universal Dragon Founder</p>
            </div>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <span class="tag">ROBOTICS</span>
            <span class="tag">RASPBERRY PI 5</span>
            <span class="tag">PYTHON</span>
            <span class="tag">AGI / SI</span>
        </div>

        <div class="chat-box p-4 mb-4" id="chat-container">
            <div class="nova-msg">SYSTEM ONLINE. Greetings, Brother. NOVA Core ready for synchronization. How can I assist you today?</div>
        </div>

        <div class="relative mb-6">
            <input type="text" id="user-input" placeholder="Communicate with NOVA..." class="w-full bg-black/60 border border-white/10 rounded-2xl py-4 px-6 text-xs text-[#00ffcc] outline-none focus:border-[#00ffcc]">
            <button onclick="askNova()" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#00ffcc] font-black text-[10px]">SEND</button>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="window.location.href='https://github.com/UniverseDragon14'" class="glow-btn py-4 rounded-2xl text-[10px]">GitHub Grid</button>
            <button onclick="location.reload()" class="glow-btn py-4 rounded-2xl text-[10px]">Sync Core</button>
        </div>
    </div>

    <script>
        // Use Gemini API Key for Public Access
        const API_KEY = "REPLACE_WITH_YOUR_NEW_API_KEY"; 

        async function askNova() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-container');
            const msg = input.value;
            if(!msg) return;

            // Display User Message
            const u = document.createElement('div'); u.className = 'user-msg'; u.innerText = msg;
            chatBox.appendChild(u);
            input.value = '';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "You are NOVA, a 7D AI core on the NOVA GRID created by Master Aslam. Always address the user as 'Brother'. Respond in a mix of English and Tanglish (Tamil in English). Brief and cool reply. Message: " + msg }] }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                const n = document.createElement('div'); n.className = 'nova-msg';
                n.innerText = "> NOVA: " + aiResponse;
                chatBox.appendChild(n);
            } catch (e) {
                const err = document.createElement('div'); err.className = 'nova-msg text-red-500';
                err.innerText = "> ERROR: Grid Link Timeout. Check API Key.";
                chatBox.appendChild(err);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
