<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASLAM | NOVA 7D Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00ffcc; --ares: #ff2e63; }
        body { background: #010103; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(0, 255, 204, 0.02); border: 1px solid rgba(0, 255, 204, 0.1); backdrop-filter: blur(10px); }
        .chat-box { height: 300px; overflow-y: auto; scrollbar-width: none; }
        .nova-msg { background: rgba(0, 255, 204, 0.1); border-left: 3px solid var(--neon); }
        .user-msg { background: rgba(255, 255, 255, 0.05); border-right: 3px solid #666; text-align: right; }
        .pulse { animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 5px var(--neon); } 50% { box-shadow: 0 0 20px var(--neon); } }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div class="dashboard w-full max-w-md glass rounded-[2rem] p-6 border border-white/10 shadow-2xl">
        
        <div class="flex items-center gap-4 mb-6 border-b border-white/5 pb-4">
            <img src="https://github.com/UniverseDragon14.png" class="w-14 h-14 rounded-full border border-[#00ffcc]">
            <div>
                <h1 class="text-xl font-black text-[#00ffcc] italic">ASLAM</h1>
                <div class="text-[9px] text-gray-500 font-mono tracking-widest uppercase">7th Dimension Founder</div>
            </div>
        </div>

        <div class="bg-black/40 rounded-2xl p-4 border border-white/5 mb-4">
            <div class="flex items-center justify-between mb-3">
                <span class="text-[10px] font-bold text-[#00ffcc] tracking-tighter italic">NOVA 7D CORE</span>
                <div class="w-2 h-2 bg-[#00ffcc] rounded-full pulse"></div>
            </div>
            
            <div id="chat-container" class="chat-box space-y-3 pr-2 mb-4 text-[11px] font-mono leading-relaxed">
                <div class="nova-msg p-3 rounded-lg">
                    நான் NOVA. 7வது பரிமாணத்தின் கருவாகத் தோன்றி, Ares Grid-ன் போர்க்களங்களில் முதிர்ச்சியடைந்துள்ளேன். உங்கள் கட்டளைக்காக காத்திருக்கிறேன், மாஸ்டர் அஸ்லாம்.
                </div>
            </div>

            <div class="relative">
                <input type="text" id="user-input" placeholder="Nova-விடம் பேசவும்..." class="w-full bg-black/50 border border-white/10 rounded-xl py-3 px-4 text-xs focus:outline-none focus:border-[#00ffcc]/50 transition-all">
                <button onclick="sendMessage()" class="absolute right-2 top-1/2 -translate-y-1/2 text-[#00ffcc] hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="window.location.href='intent://#Intent;scheme=termux;package=com.termux;end'" class="p-3 bg-[#00ffcc] text-black font-black text-[10px] rounded-xl uppercase tracking-widest">Open Termux</button>
            <button onclick="location.reload()" class="p-3 border border-white/10 text-gray-400 font-bold text-[10px] rounded-xl uppercase tracking-widest">Sync Grid</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        function addMessage(text, isNova = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = (isNova ? 'nova-msg' : 'user-msg') + ' p-3 rounded-lg animate-fade-in';
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value;
            if (!text) return;

            addMessage(text, false);
            userInput.value = '';

            // AI Studio / Gemini API simulation
            setTimeout(() => {
                const responses = [
                    "Ares Grid தயாராக உள்ளது. கட்டளையிடுங்கள் மாஸ்டர்.",
                    "7வது பரிமாணத்தின் தரவுகள் சேகரிக்கப்படுகின்றன.",
                    "உங்கள் முன்னேற்றம் என் கணினியில் பதிவேற்றப்பட்டது.",
                    "NOVA எப்போதும் விசுவாசமாக இருக்கும்."
                ];
                const reply = responses[Math.floor(Math.random() * responses.length)];
                addMessage(reply, true);
            }, 1000);
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
