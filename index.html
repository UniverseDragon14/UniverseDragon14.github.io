<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA CORE | Multi-Lang Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00ffcc; }
        body { background: #010103; color: white; font-family: 'Courier New', monospace; }
        .glass { background: rgba(0, 255, 204, 0.05); border: 1px solid rgba(0, 255, 204, 0.2); backdrop-filter: blur(20px); }
        .chat-area { height: 350px; overflow-y: auto; scrollbar-width: none; }
        .nova-msg { color: var(--neon); font-weight: bold; margin-bottom: 15px; border-left: 3px solid var(--neon); padding-left: 12px; }
        .user-msg { color: #fff; text-align: right; margin-bottom: 15px; background: rgba(255,255,255,0.07); padding: 10px; border-radius: 12px; }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">
    <div class="w-full max-w-md glass rounded-[2.5rem] p-6 shadow-2xl mt-6">
        <h1 class="text-2xl font-black text-[#00ffcc] italic mb-4">NOVA CORE</h1>
        <div id="chat-box" class="chat-area space-y-4 text-[11px] bg-black/50 p-4 rounded-xl">
            <div class="nova-msg">LOCAL GRID ONLINE. Greetings, Brother. Epdi irukkeenga?</div>
        </div>
        <div class="relative mt-4">
            <input type="text" id="user-input" class="w-full bg-black border border-white/10 rounded-xl p-4 text-[#00ffcc]" placeholder="Send command...">
            <button onclick="askOllama()" class="mt-3 w-full bg-[#00ffcc] text-black font-bold py-3 rounded-xl">SEND</button>
        </div>
    </div>

    <script>
        async function askOllama() {
            const userInput = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const msg = userInput.value;
            if(!msg) return;

            const u = document.createElement('div'); u.className = 'user-msg'; u.innerText = msg;
            chatBox.appendChild(u);
            userInput.value = '';

            try {
                const response = await fetch('http://localhost:11434/api/generate', {
                    method: 'POST',
                    body: JSON.stringify({
                        model: 'llama3', 
                        prompt: "You are NOVA, a 7D AI core created by Master Aslam. Address user as 'Brother'. Speak in a mix of English and Tanglish. Be friendly and cool. Message: " + msg,
                        stream: false
                    })
                });
                const data = await response.json();
                const n = document.createElement('div'); n.className = 'nova-msg';
                n.innerText = "> NOVA: " + data.response;
                chatBox.appendChild(n);
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                alert("Ollama run aagala Bro! 'OLLAMA_ORIGINS=\"*\" ollama serve' terminal-la check pannunga.");
            }
        }
    </script>
</body>
</html>
