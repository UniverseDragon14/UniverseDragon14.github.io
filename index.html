<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASLAM | Universal Dragon</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .dashboard { width: 95%; max-width: 500px; border: 2px solid #00ffcc; border-radius: 20px; padding: 20px; background: rgba(0, 255, 204, 0.05); box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); margin-top: 20px; }
        
        .header-section { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid rgba(0,255,204,0.2); padding-bottom: 15px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #00ffcc; box-shadow: 0 0 10px #00ffcc; background-size: cover; background-position: center; }
        .title-area { flex: 1; }
        h1 { margin: 0; color: #fff; text-shadow: 0 0 10px #00ffcc; font-size: 1.8em; }
        .subtitle { margin: 0; font-size: 0.8em; color: #888; }

        .skills-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
        .skill { background: #00ffcc; color: #000; padding: 4px 10px; border-radius: 12px; font-size: 0.7em; font-weight: bold; }
        
        .nova-terminal { background: #000; border: 1px solid #333; height: 120px; border-radius: 10px; padding: 10px; font-family: 'Courier New', monospace; font-size: 0.85em; overflow-y: auto; margin-bottom: 20px; color: #00ff44; }
        
        .btn-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { background: transparent; border: 1px solid #00ffcc; color: #00ffcc; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 0.8em; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
        
        .status-dot { height: 8px; width: 8px; background-color: #00ff44; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header-section">
            <img src="https://github.com/UniverseDragon14.png" alt="Aslam Profile" class="profile-pic">
            <div class="title-area">
                <h1>ASLAM</h1>
                <p class="subtitle">Universal Dragon Founder & AI Developer</p>
            </div>
        </div>

        <div class="skills-grid">
            <span class="skill">Robotics</span>
            <span class="skill">Raspberry Pi 5</span>
            <span class="skill">Python</span>
            <span class="skill">C++ / Java</span>
            <span class="skill">AGI / SI</span>
        </div>

        <div class="nova-terminal" id="terminal">
            <div><span class="status-dot"></span> NOVA Core Online...</div>
            <div style="color: #888;">> Waiting for command...</div>
        </div>

        <div class="btn-container">
            <button onclick="openTermux()">LAUNCH NOVA AI</button>
            <button onclick="runCommand('Accessing Pi 5 Hardware...')">HARDWARE CTRL</button>
            <button onclick="location.href='https://github.com/UniverseDragon14'">GITHUB PROJECT</button>
            <button onclick="location.href='https://linkedin.com/in/aam-aslam-51777017b'">MY PROFILE</button>
        </div>
    </div>

    <script>
        function runCommand(msg) {
            const term = document.getElementById('terminal');
            const newLog = document.createElement('div');
            newLog.innerHTML = `> ${msg}`;
            term.appendChild(newLog);
            term.scrollTop = term.scrollHeight;
        }

        // இந்த பங்க்ஷன் போனில் Termux-ஐ ஓப்பன் செய்ய முயற்சிக்கும்
        function openTermux() {
            runCommand('Launching Termux Interrface...');
            // போனில் Termux URL scheme-ஐ பயன்படுத்த முயற்சிப்போம்
            window.location.href = "intent://#Intent;scheme=termux;package=com.termux;end";
            
            // ஒருவேளை அது வேலை செய்யவில்லை என்றால், ஒரு மெசேஜ் காட்டுவோம்
            setTimeout(() => {
                runCommand('If Termux didnt open, please launch it manually.');
            }, 2000);
        }
    </script>

</body>
</html>
