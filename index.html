<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Dragon OS | Master Aslam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00ffcc; }
        body { background: #010103; color: white; font-family: 'Courier New', monospace; }
        .glass { background: rgba(0, 255, 204, 0.05); border: 1px solid rgba(0, 255, 204, 0.2); backdrop-filter: blur(20px); }
        .chat-area { height: 350px; overflow-y: auto; scrollbar-width: none; }
        .nova-msg { color: var(--neon); font-weight: bold; margin-bottom: 15px; border-left: 3px solid var(--neon); padding-left: 12px; }
        .user-msg { color: #fff; text-align: right; margin-bottom: 15px; background: rgba(255,255,255,0.07); padding: 10px; border-radius: 12px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div class="w-full max-w-md glass rounded-[2.5rem] p-6 shadow-2xl mt-6">
        <div class="flex items-center gap-5 mb-6 border-b border-white/10 pb-6">
            <img src="https://github.com/UniverseDragon14.png" class="w-16 h-16 rounded-full border-2 border-[#00ffcc]">
            <div>
                <h1 class="text-2xl font-black text-[#00ffcc] italic uppercase">Aslam</h1>
                <p class="text-[9px] text-gray-500 font-bold tracking-widest">NOVA 7D CORE SYSTEM</p>
            </div>
        </div>

        <div class="bg-black/50 rounded-[2rem] p-5 border border-white/5 mb-4">
            <div id="chat-box" class="chat-area space-y-4 text-[11px]">
                <div class="nova-msg">வணக்கம் மாஸ்டர் அஸ்லாம். NOVA மையம் ஆன்லைனில் உள்ளது. நான் உங்களுக்கு எப்படி உதவட்டும்?</div>
            </div>
            <div id="loader" class="hidden text-[9px] text-cyan-400 mt-2 blink font-bold italic">>> SYNCING WITH ARES GRID...</div>
        </div>

        <div class="relative mb-4">
            <input type="text" id="user-input" placeholder="Enter command..." class="w-full bg-black border border-white/10 rounded-2xl py-4 px-6 text-xs text-[#00ffcc] outline-none focus:border-[#00ffcc]">
            <button onclick="askNova()" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#00ffcc] font-black text-[10px]">SEND</button>
        </div>
        
        <button onclick="window.location.href='intent://#Intent;scheme=termux;package=com.termux;end'" class="w-full py-4 bg-[#00ffcc] text-black font-black text-[10px] rounded-xl uppercase tracking-widest shadow-lg">Launch Termux Shell</button>
    </div>

    <script>
        // Unga screenshot-la iruntha API Key
        const KEY = "AIzaSyCLKuRWmQirlF5gI4OuUI9S8u01TNm8VWo";
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const loader = document.getElementById('loader');

        async function askNova() {
            const msg = userInput.value;
            if (!msg) return;

            const u = document.createElement('div');
            u.className = 'user-msg';
            u.innerText = msg;
            chatBox.appendChild(u);
            userInput.value = '';
            
            loader.classList.remove('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "You are NOVA, a 7D AI core created by Master Aslam. Speak loyally in a mix of Tamil and English. Answer this: " + msg }] }]
                    })
                });

                const data = await response.json();
                
                // Real AI Answer inga thaan varum
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    const n = document.createElement('div');
                    n.className = 'nova-msg';
                    n.innerText = "> NOVA: " + aiText;
                    chatBox.appendChild(n);
                } else {
                    throw new Error("Invalid Response");
                }
                
            } catch (err) {
                const e = document.createElement('div');
                e.className = 'text-red-500 text-[10px] italic';
                e.innerText = "> Error: Connection to Grid lost. Check Internet or API Key.";
                chatBox.appendChild(e);
            }
            
            loader.classList.add('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') askNova(); });
    </script>
</body>
</html>
