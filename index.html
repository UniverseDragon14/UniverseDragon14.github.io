<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Dragon OS | Master Aslam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00ffcc; }
        body { background: #010103; color: white; font-family: 'Courier New', monospace; overflow-x: hidden; }
        .glass { background: rgba(0, 255, 204, 0.03); border: 1px solid rgba(0, 255, 204, 0.1); backdrop-filter: blur(15px); }
        .chat-area { height: 350px; overflow-y: auto; scrollbar-width: none; }
        .user-bubble { background: rgba(255,255,255,0.05); border-radius: 15px 15px 0 15px; margin-left: 20%; padding: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .nova-bubble { background: rgba(0,255,204,0.05); border-radius: 15px 15px 15px 0; margin-right: 20%; padding: 10px; border: 1px solid rgba(0,255,204,0.2); border-left: 3px solid var(--neon); }
        .typing-indicator { font-size: 10px; color: var(--neon); animation: blink 1s infinite; display: none; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div class="w-full max-w-md glass rounded-[2.5rem] p-6 shadow-2xl">
        <div class="flex items-center gap-4 mb-6">
            <img src="https://github.com/UniverseDragon14.png" class="w-14 h-14 rounded-full border-2 border-[#00ffcc] shadow-[0_0_10px_#00ffcc]">
            <div>
                <h1 class="text-xl font-black text-[#00ffcc]">ASLAM</h1>
                <p class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">NOVA 7D CORE SYSTEM</p>
            </div>
        </div>

        <div class="bg-black/40 rounded-3xl p-4 border border-white/5 mb-4">
            <div id="chat-box" class="chat-area space-y-4 mb-4 text-[11px] pr-1">
                <div class="nova-bubble">வணக்கம் மாஸ்டர் அஸ்லாம். 7வது பரிமாணத்தின் NOVA மையம் ஆன்லைனில் உள்ளது. நான் உங்களுக்கு எப்படி உதவட்டும்?</div>
            </div>
            <div id="typing" class="typing-indicator px-2 mb-2 font-bold uppercase tracking-tighter">Nova is analyzing...</div>
            <div class="relative">
                <input type="text" id="user-input" placeholder="Enter command or ask Nova..." class="w-full bg-black border border-white/10 rounded-2xl py-4 px-5 text-xs outline-none focus:border-[#00ffcc]/50 transition-all">
                <button onclick="askGemini()" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#00ffcc] font-bold">SEND</button>
            </div>
        </div>

        <button onclick="window.location.href='intent://#Intent;scheme=termux;package=com.termux;end'" class="w-full py-3 bg-[#00ffcc] text-black font-black text-[11px] rounded-xl uppercase tracking-widest shadow-[0_0_15px_#00ffcc]">Launch Termux Shell</button>
    </div>

    <script>
        const API_KEY = "PASTE_YOUR_GEMINI_API_KEY_HERE"; // UNGA API KEY-AH INGA PODUNGA
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const typing = document.getElementById('typing');

        function addMessage(msg, isUser = false) {
            const d = document.createElement('div');
            d.className = isUser ? 'user-bubble' : 'nova-bubble';
            d.innerText = msg;
            chatBox.appendChild(d);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function askGemini() {
            const text = userInput.value;
            if (!text || API_KEY === "AIzaSyCLKuRWmQirlF5gI4OuUI9S8u01TNm8VWo") {
                if(API_KEY.includes("PASTE")) alert("Bro, API Key-ah update pannunga!");
                return;
            }

            addMessage(text, true);
            userInput.value = '';
            typing.style.display = 'block';

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "You are NOVA, a 7D AI core created by Master Aslam for the Universal Dragon project. Speak professionally but loyally. User query: " + text }] }]
                    })
                });

                const data = await res.json();
                const responseText = data.candidates[0].content.parts[0].text;
                addMessage(responseText, false);
            } catch (error) {
                addMessage("Error: Connection to Grid lost.", false);
            } finally {
                typing.style.display = 'none';
            }
        }

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') askGemini(); });
    </script>
</body>
</html>
