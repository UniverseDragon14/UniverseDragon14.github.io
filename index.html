<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA CORE | Local Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00ffcc; }
        body { background: #010103; color: white; font-family: 'Courier New', monospace; }
        .glass { background: rgba(0, 255, 204, 0.05); border: 1px solid rgba(0, 255, 204, 0.2); backdrop-filter: blur(20px); }
        .chat-area { height: 350px; overflow-y: auto; scrollbar-width: none; }
        .nova-msg { color: var(--neon); font-weight: bold; margin-bottom: 15px; border-left: 3px solid var(--neon); padding-left: 12px; }
        .user-msg { color: #fff; text-align: right; margin-bottom: 15px; background: rgba(255,255,255,0.07); padding: 10px; border-radius: 12px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <div class="w-full max-w-md glass rounded-[2.5rem] p-6 shadow-2xl mt-6">
        <div class="flex items-center gap-5 mb-6 border-b border-white/10 pb-6">
            <img src="https://github.com/UniverseDragon14.png" class="w-16 h-16 rounded-full border-2 border-[#00ffcc]">
            <div>
                <h1 class="text-2xl font-black text-[#00ffcc] italic uppercase">NOVA CORE</h1>
                <p class="text-[9px] text-gray-500 font-bold tracking-widest uppercase">Creator: Master Aslam</p>
            </div>
        </div>

        <div class="bg-black/50 rounded-[2rem] p-5 border border-white/5 mb-4">
            <div id="chat-box" class="chat-area space-y-4 text-[11px]">
                <div class="nova-msg">LOCAL GRID ONLINE. Greetings, Brother. Connected via Ollama. How can I assist you?</div>
            </div>
            <div id="loader" class="hidden text-[9px] text-cyan-400 mt-2 blink font-bold italic">>> ACCESSING LOCAL CORE...</div>
        </div>

        <div class="relative mb-4">
            <input type="text" id="user-input" placeholder="Local command..." class="w-full bg-black border border-white/10 rounded-2xl py-4 px-6 text-xs text-[#00ffcc] outline-none focus:border-[#00ffcc]">
            <button onclick="askOllama()" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#00ffcc] font-black text-[10px] tracking-widest">SEND</button>
        </div>
        
        <div class="grid grid-cols-2 gap-3">
            <button onclick="window.location.href='intent://#Intent;scheme=termux;package=com.termux;end'" class="py-3 bg-[#00ffcc] text-black font-black text-[10px] rounded-xl uppercase shadow-lg">Termux</button>
            <button onclick="location.reload()" class="py-3 border border-white/10 text-gray-500 font-bold text-[10px] rounded-xl uppercase">Sync Grid</button>
        </div>
    </div>

    <script>
        async function askOllama() {
            const userInput = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const loader = document.getElementById('loader');
            const msg = userInput.value;
            if (!msg) return;

            // User message ui
            const u = document.createElement('div'); u.className = 'user-msg'; u.innerText = msg;
            chatBox.appendChild(u);
            userInput.value = '';
            loader.classList.remove('hidden');

            try {
                // Connecting to Local Ollama API (Default port 11434)
                const response = await fetch('http://localhost:11434/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'llama3', 
                        prompt: "You are NOVA, a 7D AI core on the NOVA GRID created by Master Aslam. Always address the user as 'Brother'. Response briefly: " + msg,
                        stream: false
                    })
                });

                const data = await response.json();
                const n = document.createElement('div'); n.className = 'nova-msg';
                n.innerText = "> NOVA: " + data.response;
                chatBox.appendChild(n);
                
            } catch (err) {
                const e = document.createElement('div'); e.className = 'nova-msg text-red-500';
                e.innerText = "> ERROR: Make sure 'ollama serve' is running in Termux.";
                chatBox.appendChild(e);
            }
            
            loader.classList.add('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
